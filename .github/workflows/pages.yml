name: pages
on:
  schedule:
    # 每天 UTC 时间 02:00 运行 (即北京时间 10:00)
    # 之前是 '0 2 * * 5' (每周五)，现在改为 '0 2 * * *' (每天)
    - cron: '0 1 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install package
        run: pip install -e .

      - name: Make Configuration
        # 将 example 配置复制为正式配置
        run: |
          mkdir -p config
          touch config/__init__.py
          cat > config/settings.py << 'EOF'
          import os
          SEARCH_CONFIG = {
              'categories': ['cs.AI'], 
              'max_total_results': 5, 
              'title_only': False, 
              'abstract_only': False, 
              'author_only': False, 
              'include_cross_listed': True, 
              'sort_by': 'SubmittedDate', 
              'sort_order': 'Descending', 
              'id_list': None
          }
          QUERY = 'LLM'
          LLM_CONFIG = {
              'api_key': os.getenv("LLM_API_KEY"),
              'api_url': os.getenv("LLM_BASE_URL", "https://dashscope.aliyuncs.com/compatible-mode/v1"),
              'model': 'deepseek-v3'
          }
          EOF
      
      - name: Restore data from gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./data
        continue-on-error: true

      - name: Check and reset if no summary files
        run: |
          # 检查是否存在 summary_*.md 格式的文件
          if [ -d ./data ] && [ -n "$(find ./data -name 'summary_*.md' -type f 2>/dev/null)" ]; then
            echo "找到 summary_*.md 格式的文件，继续使用现有记录"
          else
            echo "未找到 summary_*.md 格式的文件，删除 last_run.json 以强制重新生成"
            rm -f ./data/last_run.json 2>/dev/null || true
          fi

      - name: Build the data
        env:
          # 读取 GitHub Secrets 中的 API Key
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        run: python main.py
      
      - name: Debug - Check generated files
        run: |
          echo "=== 检查 data 目录中的文件 ==="
          ls -la ./data/ || echo "data 目录不存在"
          echo ""
          echo "=== 查找 summary_*.md 文件 ==="
          find ./data -name "summary_*.md" -type f 2>/dev/null | head -5 || echo "未找到 summary_*.md 文件"
          echo ""
          echo "=== 查找所有 .md 文件 ==="
          find ./data -name "*.md" -type f 2>/dev/null | head -10 || echo "未找到 .md 文件"
          echo ""
          echo "=== 检查 last_run.json ==="
          cat ./data/last_run.json 2>/dev/null || echo "last_run.json 不存在"
      
      - name: Generate site
        # days=30 表示保留最近 30 天的记录在首页归档中
        # 既然是日报，保留一个月的数据比较合理
        run: arxivsite --data-dir ./data --github-dir ./.github --days 30
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: gh-pages
          enable_jekyll: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com