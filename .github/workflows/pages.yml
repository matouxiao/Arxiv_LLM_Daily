name: pages
on:
  schedule:
    # 每天 UTC 时间 02:00 运行 (即北京时间 10:00)
    # 之前是 '0 2 * * 5' (每周五)，现在改为 '0 2 * * *' (每天)
    - cron: '0 1 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install package
        run: pip install -e .

      - name: Make Configuration
        # 将 example 配置复制为正式配置
        run: |
          cp ./config/settings.example.py ./config/settings.py
      
      - name: Restore data from gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./data
        continue-on-error: true

      - name: Build the data
        env:
          # 读取 GitHub Secrets 中的 API Key
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: arxivsummary
      
      - name: Generate site
        # days=30 表示保留最近 30 天的记录在首页归档中
        # 既然是日报，保留一个月的数据比较合理
        run: arxivsite --data-dir ./data --github-dir ./.github --days 30
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: gh-pages
          enable_jekyll: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com